discord: 
on:
  -push
jobs:
  discord:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run Discord Webhook
        uses: sniddl/discord-comits@v1.6
        with:
          webhook_url: ${{ secrets.DISCORD_WEBHOOK }}
          tamplete: "New commit"
          include_author: true

