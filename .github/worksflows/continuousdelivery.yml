name: continuous delivery
on:
criacao-continuous-deployment
  push:
    branches:
    - main
    
jobs:
  delivery:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
        
      - names: Simulando Continuous Delivery
        uses: actions/upload-artifact@v4
        with:
          name: projetozipado.zip
          path: |
            main.py
            README.md

  deploy:
    runs-on: ubuntu-latest
    needs: delivery
    steps:
      -uses: actions/download-artifact@v4
        with:
          name: projetozipado.zip
      - name: Display structure od downloaded files
        run: ls -la 
