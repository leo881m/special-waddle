name: Continuous Delivery

on:
  pull_request:
    branches:
      - main

jobs:
  deliver:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Test app
        run: echo "Build OK"

  docker:
    runs-on: ubuntu-latest
    needs: deliver

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # Setup Docker Buildx (padrão oficial)
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # Build da imagem
      - name: Build Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          tags: minha-api:latest

  deploy:
    runs-on: ubuntu-latest
    needs: docker

    steps:
      - name: Deploy
        run: echo "Deploy realizado"