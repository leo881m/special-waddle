name: Continuous Delivery

on:
  push:
    branches:
      - main

jobs:
  delivery:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout do código
        uses: actions/checkout@v4

      - name: Gerar artefato
        uses: actions/upload-artifact@v4
        with:
          name: projetozipado
          path: |
            main.py
            README.md

  docker:
    runs-on: ubuntu-latest
    needs: delivery

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          tags: minha-api:latest

  deploy:
    runs-on: ubuntu-latest
    needs: docker

    steps:
      - name: Baixar artefato
        uses: actions/download-artifact@v4
        with:
          name: projetozipado

      - name: Simular deploy
        run: ls -R

      - name: Simular deploy
        run: ls -R 
        

 discord:
 on:
  -push
 jobs:
  discord:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run Discord Webhook
        uses: sniddl/discord-comits@v1.6
        with:
          webhook_url: ${{ secrets.DISCORD_WEBHOOK }}
          tamplete: "New commit"
          include_author: true

          

